name: Update YARA Signatures

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-yara-signatures:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Update bundled signatures
        run: scripts/update-yara-signatures.sh

      - name: Show signature changes
        run: git status --short supplied/signature-base

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/update-yara-signatures
          commit-message: "chore: update bundled YARA signatures"
          title: "Update bundled YARA signatures"
          body: |
            Updates the bundled YARA rules from `Neo23x0/signature-base`.

            This PR was generated by the scheduled signature updater workflow.
          labels: dependencies, security
          delete-branch: true
