name: Fuzz

on:
  pull_request:
    paths:
      - ".github/workflows/fuzz.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "fuzz/**"
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Seconds to run each fuzz target"
        required: false
        default: "60"

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - domain_inputs
          - wheel_archive
          - distribution_validation
          - wheel_audit

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: nightly-fuzz-${{ matrix.target }}
          workspaces: |
            . -> target
            fuzz -> fuzz/target

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz target
        env:
          MAX_TOTAL_TIME: ${{ github.event.inputs.max_total_time || '60' }}
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=${MAX_TOTAL_TIME} -rss_limit_mb=4096
