name: Build & Release on Tag

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: pyregistry-linux-x86_64
            binary_name: pyregistry
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: pyregistry-windows-x86_64.exe
            binary_name: pyregistry.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: stable-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p pyregistry --target ${{ matrix.target }}

      - name: Stage release binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}"

      - name: Upload release binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  build-macos-universal:
    name: Build macOS universal
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: stable-macos-universal

      - name: Build x86_64 release binary
        run: cargo build --release -p pyregistry --target x86_64-apple-darwin

      - name: Build aarch64 release binary
        run: cargo build --release -p pyregistry --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            target/x86_64-apple-darwin/release/pyregistry \
            target/aarch64-apple-darwin/release/pyregistry \
            -output dist/pyregistry-macos-universal
          chmod +x dist/pyregistry-macos-universal

      - name: Upload release binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyregistry-macos-universal
          path: dist/pyregistry-macos-universal

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build
      - build-macos-universal
    steps:
      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
