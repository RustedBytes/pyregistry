version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pyregistry
      POSTGRES_USER: pyregistry
      POSTGRES_PASSWORD: pyregistry
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pyregistry
      MINIO_ROOT_PASSWORD: pyregistry123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 pyregistry pyregistry123; do sleep 1; done;
      mc mb --ignore-existing local/pyregistry;
      mc anonymous set none local/pyregistry;
      "

  jwks:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./docker/jwks:/usr/share/nginx/html:ro

volumes:
  postgres-data:
  minio-data:
