version: "3.9"

services:
  pyregistry:
    build:
      context: .
    image: pyregistry:local
    environment:
      BIND_ADDRESS: 0.0.0.0:3000
      BLOB_ROOT: /var/lib/pyregistry/blobs
      DATABASE_STORE: sqlite
      SQLITE_PATH: /var/lib/pyregistry/pyregistry.sqlite3
      ARTIFACT_STORAGE_BACKEND: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_ROOT: /var/lib/pyregistry/blobs
      YARA_RULES_PATH: /app/supplied/signature-base/yara
      OIDC_ISSUERS: github|https://issuer.pyregistry.local|http://jwks/jwks.json|pyregistry
      SUPERADMIN_EMAIL: admin@pyregistry.local
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:?set SUPERADMIN_PASSWORD}
      COOKIE_SECRET: ${COOKIE_SECRET:?set COOKIE_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - pyregistry-data:/var/lib/pyregistry
    depends_on:
      - jwks

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pyregistry
      POSTGRES_USER: pyregistry
      POSTGRES_PASSWORD: pyregistry
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: Pyregistry123!
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pyregistry
      MINIO_ROOT_PASSWORD: pyregistry123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 pyregistry pyregistry123; do sleep 1; done;
      mc mb --ignore-existing local/pyregistry;
      mc anonymous set none local/pyregistry;
      "

  jwks:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./docker/jwks:/usr/share/nginx/html:ro

volumes:
  pyregistry-data:
  postgres-data:
  sqlserver-data:
  minio-data:
