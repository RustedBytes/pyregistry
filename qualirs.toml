exclude_paths = [
    "target",
    ".git",
    "node_modules",
]
# Baseline low-signal project conventions:
# - boundary DTO/model modules intentionally expose many public data types
# - domain validation regexes are lazy statics, not mutable runtime state
# - feature-gated infrastructure modules are expected in this crate layout
# - a few local data carriers and delivery-layer booleans are deliberate
ignore_findings = [
    "Q0002",
    "Q0008",
    "Q0012",
    "Q0016",
    "Q0027",
    "Q0042",
    "Q0062",
]
min_severity = "info"

[thresholds.arch]
god_module_loc = 2700
god_module_items = 160
public_api_ratio = 1.0
feature_concentration = 20
hidden_global_state = 5

[thresholds.design]
large_trait_methods = 32
excessive_generics = 5
deep_trait_bounds = 4
wide_hierarchy = 20
fat_impl_methods = 20
god_struct_fields = 20
primitive_obsession_fields = 4
data_clumps_args = 3
data_clumps_occurrences = 4
stringly_typed_fields = 3
large_error_enum_variants = 17

[thresholds.impl]
long_function_loc = 100
long_closure_loc = 40
deep_closure_nesting = 3
cyclomatic_complexity = 28
too_many_arguments = 7
deep_match_nesting = 3
deep_if_else = 4
excessive_unwrap = 3
large_enum_variants = 20
long_method_chain = 4
lifetime_explosion = 4
unsafe_block_overuse = 5
deeply_nested_type = 4
interior_mutability_abuse = 5

[thresholds.concurrency]
large_future_loc = 100
arc_mutex_overuse = 3

[thresholds.unsafe]
unsafe_without_comment = true

[policy]
skip_tests = true
test_path_markers = [
    "tests",
    "test",
    "tests.rs",
    "_tests.rs",
    "fuzz",
    "fuzz_targets",
]
skip_data_carrier_structs = true
skip_template_structs = true
data_carrier_struct_suffixes = [
    "Activity",
    "Command",
    "Config",
    "ConfigFile",
    "Descriptor",
    "Details",
    "Dto",
    "DTO",
    "Entry",
    "Event",
    "Failure",
    "Finding",
    "FormData",
    "Grant",
    "Hit",
    "Inspection",
    "Item",
    "Link",
    "Metrics",
    "Notification",
    "Options",
    "Outcome",
    "Overview",
    "Page",
    "Query",
    "Report",
    "Request",
    "Response",
    "Result",
    "Settings",
    "SettingsFile",
    "Session",
    "Snapshot",
    "Stats",
    "Summary",
    "Template",
    "Variant",
    "View",
    "Vulnerability",
]
