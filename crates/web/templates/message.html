<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: #f5f8f4;
        color: #15211d;
      }
      article {
        background: white;
        border: 1px solid #d9e3dc;
        border-radius: 18px;
        padding: 28px;
        width: min(520px, calc(100vw - 32px));
      }
      a { color: #176341; }
    </style>
  </head>
  <body>
    <article>
      <h1>{{ title }}</h1>
      <p>{{ message }}</p>
      <p><a href="{{ back_href }}">Continue</a></p>
    </article>
  </body>
</html>
