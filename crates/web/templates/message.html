<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --surface: #ffffff;
        --ink: #171c24;
        --muted: #667085;
        --line: #d8dee8;
        --accent: #0f766e;
        --accent-strong: #0b5f59;
        --focus: #2563eb;
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #101417;
        --surface: #171d22;
        --ink: #f4f7f8;
        --muted: #a7b2bd;
        --line: #2b353d;
        --accent: #14b8a6;
        --accent-strong: #5eead4;
        --focus: #60a5fa;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, "Avenir Next", "Segoe UI", system-ui, sans-serif;
      }
      article {
        width: min(560px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 26px;
        box-shadow: 0 20px 45px rgba(23, 28, 36, 0.08);
      }
      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        margin-bottom: 18px;
        box-shadow: 0 10px 24px rgba(15, 118, 110, 0.18);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.75rem;
        line-height: 1.15;
      }
      p {
        color: var(--muted);
        line-height: 1.55;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        border-radius: 8px;
        padding: 10px 14px;
        background: var(--accent);
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
      }
      a:hover {
        background: var(--accent-strong);
      }
      a:focus-visible {
        outline: 3px solid rgba(37, 99, 235, 0.35);
        outline-offset: 3px;
      }
      .theme-toggle {
        width: 100%;
        min-height: 40px;
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 14px;
        background: var(--surface);
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }
      .theme-toggle:hover {
        background: var(--bg);
      }
    </style>
    <script>
      (() => {
        const storedTheme = localStorage.getItem("pyregistry-theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = storedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <article>
      <img class="brand-mark" alt="" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f766e'/%3E%3Cpath d='M14 20l18-10 18 10v24L32 54 14 44z' fill='%23fff'/%3E%3Cpath d='M32 10v20l18-10M32 30L14 20M32 30v24' fill='none' stroke='%23171c24' stroke-width='3' stroke-linejoin='round' opacity='.34'/%3E%3C/svg%3E">
      <h1>{{ title }}</h1>
      <p>{{ message }}</p>
      <p><a href="{{ back_href }}">Continue</a></p>
      <button class="theme-toggle" type="button" aria-pressed="false">Dark mode</button>
    </article>
    <script>
      (() => {
        const button = document.querySelector(".theme-toggle");
        if (!(button instanceof HTMLButtonElement)) {
          return;
        }

        function applyTheme(theme) {
          document.documentElement.dataset.theme = theme;
          localStorage.setItem("pyregistry-theme", theme);
          const isDark = theme === "dark";
          button.setAttribute("aria-pressed", String(isDark));
          button.textContent = isDark ? "Light mode" : "Dark mode";
        }

        applyTheme(document.documentElement.dataset.theme || "light");
        button.addEventListener("click", () => {
          applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
        });
      })();
    </script>
  </body>
</html>
